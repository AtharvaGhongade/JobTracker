version: "3.8"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: jobtrackr
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./app/backend
    restart: unless-stopped
    environment:
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_HOST: db
      DB_NAME: jobtrackr
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
